name: Security & Dependencies

on:
  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Audit Backend Dependencies
        working-directory: ./backend
        run: |
          echo "🔍 Auditing backend dependencies..."
          npm audit --audit-level=moderate || true
          npm audit --json > backend-audit.json || true

      - name: Audit Frontend Dependencies
        working-directory: ./frontend
        run: |
          echo "🔍 Auditing frontend dependencies..."
          npm audit --audit-level=moderate || true
          npm audit --json > frontend-audit.json || true

      - name: Check for outdated packages (Backend)
        working-directory: ./backend
        run: |
          echo "📦 Checking outdated backend packages..."
          npm outdated || true

      - name: Check for outdated packages (Frontend)
        working-directory: ./frontend
        run: |
          echo "📦 Checking outdated frontend packages..."
          npm outdated || true

      - name: Upload audit reports
        uses: actions/upload-artifact@v3
        with:
          name: security-audit-reports
          path: |
            backend/backend-audit.json
            frontend/frontend-audit.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
